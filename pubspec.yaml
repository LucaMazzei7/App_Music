name: app_music
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter 
  cupertino_icons: ^1.0.8

  # === DEPENDENCIAS DE SPOTIFY Y MANEJO DE ESTADO ===
  image_picker: ^1.1.2
  provider: ^6.1.2
  permission_handler: ^12.0.3
  palette_generator: ^0.3.3
  firebase_core: ^3.0.0      # O la versión que ellos hayan usado
  firebase_auth: ^5.0.0      # Para el inicio de sesión
  cloud_firestore: ^5.0.0    # Para la base de datos de canciones y playlists
  just_audio: ^0.10.6
  just_audio_windows: ^0.2.3
  audio_session: 0.2.3
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - data/menu_opts.json
    - assets/image/